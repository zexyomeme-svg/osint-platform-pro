{% extends "base.html" %}
{% block title %}Name Search - OSINT Platform Pro{% endblock %}
{% block content %}
<div class="card" style="margin-top: 2rem;">
    <div class="card-header">📝 Person Name Search</div>
    <div class="card-body">
        <form id="nameSearchForm">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" id="firstName" placeholder="e.g., John" required>
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" id="lastName" placeholder="e.g., Doe" required>
            </div>
            <div class="form-group">
                <label>Location (Optional)</label>
                <input type="text" id="location" placeholder="e.g., California">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Search Person</button>
        </form>
        <div id="loading" class="loading"><div class="spinner"></div><p>Searching...</p></div>
        <div id="results" class="results"></div>
    </div>
</div>
<script>
    document.getElementById('nameSearchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const location = document.getElementById('location').value.trim();
        if (!firstName || !lastName) {
            showAlert('First and last names required', 'warning');
            return;
        }
        document.getElementById('loading').classList.add('show');
        document.getElementById('results').innerHTML = '';
        try {
            const response = await fetch('/api/name-search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({first_name: firstName, last_name: lastName, location: location})
            });
            const data = await response.json();
            document.getElementById('loading').classList.remove('show');
            if (data.success) {
                let html = `<h3>Results for: ${data.data.name}</h3>`;
                for (const [platform, info] of Object.entries(data.data.platforms)) {
                    const status = info.available ? '<span class="badge badge-success">Available</span>' : '<span class="badge badge-danger">Unavailable</span>';
                    html += `<div class="result-item"><h4>${platform}</h4><p>Status: ${status}</p><p><a href="${info.url}" target="_blank">${info.url}</a></p></div>`;
                }
                document.getElementById('results').innerHTML = html;
            } else {
                showAlert('Error: ' + data.error, 'danger');
            }
        } catch (error) {
            document.getElementById('loading').classList.remove('show');
            showAlert('Search failed: ' + error.message, 'danger');
        }
    });
</script>
{% endblock %}
